apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-travel-agent
  labels:
    app: ai-travel-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-travel-agent
  template:
    metadata:
      labels:
        app: ai-travel-agent
    spec:
      containers:
        - name: ai-travel-agent
          image: ai-travel-agent:latest
          ports:
            - containerPort: 8501
          envFrom:
            - secretRef:
                name: ai-travel-agent-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ai-travel-agent-service
spec:
  selector:
    app: ai-travel-agent
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8501
  type: LoadBalancer